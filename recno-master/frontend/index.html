<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECNO - Proxy Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="app" class="flex h-screen overflow-hidden">

        <aside class="w-64 bg-slate-900 text-white flex flex-col transition-all duration-300" :class="{'hidden sm:flex': !isMobileMenuOpen}">
            <div class="p-4 text-2xl font-bold border-b border-slate-700 flex justify-between items-center">
                <span>RECNO</span>
                <button @click="isMobileMenuOpen = false" class="sm:hidden text-gray-400 hover:text-white">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>

            <!-- Language Switcher -->
            <div class="p-4 border-b border-slate-700 flex justify-around">
                <button @click="setLang('ru')" :class="{'text-blue-400': lang === 'ru', 'text-gray-400': lang !== 'ru'}" class="font-bold hover:text-white transition">RU</button>
                <button @click="setLang('en')" :class="{'text-blue-400': lang === 'en', 'text-gray-400': lang !== 'en'}" class="font-bold hover:text-white transition">EN</button>
            </div>

            <nav class="flex-1 p-4 space-y-2">
                <a href="#" @click="currentTab = 'dashboard'" :class="{'bg-blue-600': currentTab === 'dashboard'}" class="block p-3 rounded hover:bg-blue-500 transition"><i class="fa-solid fa-chart-pie mr-2"></i> {{ t.dashboard }}</a>
                <a href="#" @click="currentTab = 'users'" :class="{'bg-blue-600': currentTab === 'users'}" class="block p-3 rounded hover:bg-blue-500 transition"><i class="fa-solid fa-users mr-2"></i> {{ t.users }}</a>
                <a href="#" @click="currentTab = 'nodes'" :class="{'bg-blue-600': currentTab === 'nodes'}" class="block p-3 rounded hover:bg-blue-500 transition"><i class="fa-solid fa-server mr-2"></i> {{ t.nodes }}</a>
                <a href="#" @click="currentTab = 'config'" :class="{'bg-blue-600': currentTab === 'config'}" class="block p-3 rounded hover:bg-blue-500 transition"><i class="fa-solid fa-cog mr-2"></i> {{ t.settings }}</a>
            </nav>
            <div class="p-4 border-t border-slate-700">
                <button class="w-full bg-red-600 hover:bg-red-700 text-white p-2 rounded transition"><i class="fa-solid fa-sign-out-alt mr-2"></i> {{ t.logout }}</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white shadow-sm p-4 flex justify-between items-center sm:hidden">
                <span class="text-xl font-bold">RECNO</span>
                <button @click="isMobileMenuOpen = true" class="text-gray-600 text-2xl">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </header>

            <div class="p-6">
                <!-- Дашборд -->
                <div v-if="currentTab === 'dashboard'">
                    <h1 class="text-3xl font-bold mb-6">{{ t.dashboard }}</h1>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">{{ t.total_users }}</p>
                                <p class="text-3xl font-bold">{{ users.length }}</p>
                            </div>
                            <div class="text-blue-500 text-4xl"><i class="fa-solid fa-users"></i></div>
                        </div>
                    </div>
                </div>

                <!-- Пользователи -->
                <div v-if="currentTab === 'users'">
                    <div class="flex justify-between items-center mb-6">
                        <h1 class="text-3xl font-bold">{{ t.users }}</h1>
                        <button @click="addUser" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition"><i class="fa-solid fa-plus mr-2"></i>{{ t.add_user }}</button>
                    </div>
                    <!-- Таблица ... -->
                    <div class="bg-white p-4 rounded border text-gray-500 text-center">{{ t.no_users_yet }}</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const translations = {
            ru: {
                dashboard: "Дашборд", users: "Пользователи", nodes: "Ноды", settings: "Настройки",
                logout: "Выход", total_users: "Всего пользователей", add_user: "Добавить", no_users_yet: "Пользователей пока нет..."
            },
            en: {
                dashboard: "Dashboard", users: "Users", nodes: "Nodes", settings: "Settings",
                logout: "Logout", total_users: "Total Users", add_user: "Add User", no_users_yet: "No users yet..."
            }
        };

        const { createApp } = Vue

        createApp({
            data() {
                return {
                    lang: 'ru',
                    currentTab: 'dashboard',
                    isMobileMenuOpen: false,
                    users: []
                }
            },
            computed: {
                t() { return translations[this.lang]; }
            },
            methods: {
                setLang(l) { this.lang = l; localStorage.setItem('recno_lang', l); },
                async addUser() { /* mock */ }
            },
            mounted() {
                const saved = localStorage.getItem('recno_lang');
                if(saved) this.lang = saved;
            }
        }).mount('#app')
    </script>
</body>
</html>
